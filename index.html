<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Herbarium</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fredericka+the+Great&family=Xanh+Mono:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="flipbook">
      <!-- Page 1 -->
      <div class="page" id="page-1">
        <div class="deco">
          <img src="images/page1_deco.svg" alt="Fond deco page 1" />
        </div>
        <div id="page1_description">
          <h1>Herbarium</h1>
          <p>Magazine de plantes<br />pour les débutants</p>
        </div>
      </div>

      <!-- Page 2 -->
      <div class="page" id="page-2">
        <div class="deco">
          <img src="images/page2_deco.svg" alt="Fond deco page 2" />
        </div>
        <h2>Le Magazine</h2>
        <p>Découvrez le monde des plantes, <br />même sans la main verte.</p>
        <div>
          <article class="card">
            <figure>
              <img class="img_card" src="images/pic1_card.svg" alt="Image card 1" />
            </figure>
            <h3>Plantes</h3>
            <p>Des guides clairs pour chaque plante</p>
          </article>
        </div>
        <p>«Les plantes ne parlent pas, <br /> mais elles ont beaucoup à dire.»</p>
      </div>

      <!-- Page 3 -->
      <div class="page" id="page-3">Page 3</div>

      <!-- Page 4 -->
      <div class="page" id="page-4">Page 4</div>
    </div>

    <script src="js/page-flip.browser.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
